<h3>Recent Orders</h3>

<div class="table-container">

    <thead>

        <th>Order #</th>
        <th>Date</th>

<script src="sc-guard.js"></script>
<script src="sc-header.js"></script>
<script src="sc-logout-confirm.js"></script>
<script>
const formatCurrency = (value) => {
    const num = Number(value);
    if (!Number.isFinite(num)) return "₱0.00";
    return `₱${num.toLocaleString("en-PH", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};

const setText = (id, text) => {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
};

const showFallbackOrders = () => {
    const tableBody = document.getElementById("recentOrders");
    if (!tableBody) return;
    tableBody.innerHTML = "";
    const row = tableBody.insertRow();
    const cell = row.insertCell();
    cell.colSpan = 4;
    cell.textContent = "Connect Supabase to view orders.";
    cell.style.textAlign = "center";
    cell.style.padding = "2rem";
};

const populateFallbackDashboard = (user) => {
    const creditLimit = Number(user.creditAmount) || 0;
    setText("storeName", user.storeName || "Sister Company");
    setText("creditLimit", formatCurrency(creditLimit));
    setText("creditUsed", formatCurrency(0));
    setText("creditAvailable", formatCurrency(creditLimit));
    showFallbackOrders();
};

async function loadDashboard(){
    let user;
    try {
        user = JSON.parse(localStorage.getItem("scUser"));
    } catch (e) {
        user = null;
    }

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const supabaseAvailable = typeof supabaseClient !== "undefined";
    if (!supabaseAvailable || !user.store_id) {
        populateFallbackDashboard(user);
        return;
    }

    const { data: store, error: storeError } = await supabaseClient
        .from("sc_stores")
        .select("store_name, credit_limit, credit_used")
        .eq("id", user.store_id)
        .single();

    if (storeError || !store) {
        console.error("Error fetching store data:", storeError?.message);
        setText("storeName", "Error");
        return;
    }

    const creditLimit = Number(store.credit_limit) || 0;
    const creditUsed = Number(store.credit_used) || 0;
    const creditAvailable = creditLimit - creditUsed;

    setText("storeName", store.store_name);
    setText("creditLimit", formatCurrency(creditLimit));
    setText("creditUsed", formatCurrency(creditUsed));
    setText("creditAvailable", formatCurrency(creditAvailable));

    const { data: orders, error: ordersError } = await supabaseClient
        .from("sc_orders")
        .select("id, created_at, order_total, status")
        .eq("store_id", user.store_id)
        .order("created_at", { ascending: false })
        .limit(5);

    if (ordersError) {
        console.error("Error fetching recent orders:", ordersError.message);
        return;
    }

    const tableBody = document.getElementById("recentOrders");
    if (!tableBody) return;

    tableBody.innerHTML = ""; // Clear previous content

    if (!orders || orders.length === 0) {
        const row = tableBody.insertRow();
        const cell = row.insertCell();
        cell.colSpan = 4;
        cell.textContent = "No recent orders found.";
        cell.style.textAlign = "center";
        cell.style.padding = "2rem";
        return;
    }

    orders.forEach(o => {
        const row = tableBody.insertRow();
        row.insertCell().textContent = o.id;
        row.insertCell().textContent = new Date(o.created_at).toLocaleDateString('en-CA'); // YYYY-MM-DD
        row.insertCell().textContent = formatCurrency(o.order_total);
        row.insertCell().textContent = o.status;
    });
}

loadDashboard()

</script>
